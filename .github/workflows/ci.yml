name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  # -----------------------------------------------------------------------
  # Repo hygiene: enforce text invariants that should fail before tests run.
  # -----------------------------------------------------------------------
  repo-hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: No em dash
        run: |
          matches="$(git grep -n $'\u2014' -- . || true)"
          if [ -n "$matches" ]; then
            printf '%s\n' "$matches"
            echo "Em dash found; use -- instead." >&2
            exit 1
          fi

  # -----------------------------------------------------------------------
  # Workbench: TypeScript build + vitest unit + round-trip tests
  # -----------------------------------------------------------------------
  workbench:
    name: Workbench (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workbench

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: workbench/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: High-severity dependency audit
        run: npm audit --audit-level=high

      - name: TypeScript build
        run: npm run build

      - name: Unit + round-trip tests
        run: npm test

  # -----------------------------------------------------------------------
  # Redaction core package: build + unit tests
  # -----------------------------------------------------------------------
  redaction-core:
    name: redaction-core (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/redaction-core

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/redaction-core/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: High-severity dependency audit
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

  # -----------------------------------------------------------------------
  # Gate + appliance + training: torch-free tests (Tier-0 re + merge + gateway wiring).
  # Excluded: gate/tests/test_maxlen.py and training/tests/test_compute_metrics.py
  # (both require torch/onnxruntime on the GPU box).
  # -----------------------------------------------------------------------
  gate-floor:
    name: Gate + appliance torch-free tests (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test deps
        run: pip install -r requirements-test.txt

      - name: Python dependency audit
        run: |
          python -m pip install pip-audit==2.10.1
          python -m pip_audit -r requirements-test.txt --strict

      # Two SEPARATE pytest invocations on purpose: gate/ and appliance/ both ship a module named
      # `privacy_gate` (the gate's thin checksum-exact floor vs the appliance's thicker floor), so a single
      # interpreter collides on sys.modules['privacy_gate'] and the second domain imports the wrong copy.
      # Separate processes keep each domain importing its own file. All of these are torch-free: the FastAPI
      # TestClient deps (fastapi/httpx/uvicorn/pydantic/pyyaml) are pinned in requirements-test.txt, and the
      # torch/onnxruntime/transformers NER tiers are imported LAZILY inside privacy_gate.py methods only.
      - name: Run torch-free gate tests
        run: |
          python -m pytest \
            gate/tests/test_validated_floor.py \
            gate/tests/test_merge.py \
            gate/tests/test_gate_regression.py \
            gate/tests/test_gate_parity_vectors.py \
            gate/tests/test_cue_name.py \
            gate/tests/test_deploy_gate_service_sync.py \
            gate/tests/test_redact_sweep.py \
            training/gen/tests \
            training/tests/test_labeling.py \
            training/tests/test_remap_scheme.py \
            validation/test_parity_check.py \
            -v

      # The FULL appliance suite, in its own process (see the collision note above). This is the
      # redaction-critical regression net that public CI previously skipped: control CORS/CSRF guard, floor
      # hardening (the 2026-06-20 bypass locks), secret-key force-redact, input-shape fail-open, settings/mode
      # invariants, denylist, glued-checksum, IPv6 / US-ZIP, live-view safety. A PR that regresses any of these
      # now fails public CI instead of being caught only by a local run.
      - name: Run torch-free appliance tests
        run: python -m pytest appliance/tests -v
